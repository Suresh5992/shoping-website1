apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopping-ingress
  namespace: shopping
spec:
  ingressClassName: nginx
  rules:
  - host: shop.local
    http:
      paths:

      # 🔥 API FIRST (important)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 3000

      # frontend AFTER
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

      # pgadmin
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: pgadmin
            port:
              number: 80
